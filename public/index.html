<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus Chat — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #04040d;
      --surface: rgba(255,255,255,0.045);
      --border:  rgba(255,255,255,0.10);
      --cyan:    #00e5ff;
      --violet:  #9b5de5;
      --rose:    #f72585;
      --green:   #00e676;
      --text:    #e8eaf6;
      --muted:   rgba(232,234,246,0.44);
    }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow: hidden; }

    /* ── Blobs ── */
    .blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob  { position: absolute; border-radius: 50%; filter: blur(90px); animation: drift linear infinite; }
    .b1 { width:560px;height:560px;opacity:.48;background:radial-gradient(circle,#9b5de5,#5390d9);top:-160px;left:-100px;animation-duration:20s; }
    .b2 { width:440px;height:440px;opacity:.42;background:radial-gradient(circle,#00e5ff,#7b2ff7);bottom:-120px;right:-70px;animation-duration:25s;animation-delay:-8s; }
    .b3 { width:260px;height:260px;opacity:.32;background:radial-gradient(circle,#f72585,#b5179e);top:44%;left:60%;animation-duration:32s;animation-delay:-16s; }
    @keyframes drift { 0%{transform:translate(0,0) scale(1) rotate(0deg)} 33%{transform:translate(38px,-22px) scale(1.05) rotate(120deg)} 66%{transform:translate(-22px,42px) scale(0.97) rotate(240deg)} 100%{transform:translate(0,0) scale(1) rotate(360deg)} }

    .grain { position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px; }
    .grid { position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:linear-gradient(rgba(0,229,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.028) 1px,transparent 1px);
      background-size:58px 58px; }

    .stage { position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px; }

    .card {
      width:100%;max-width:448px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:44px 40px 40px;
      backdrop-filter:blur(36px) saturate(160%);
      -webkit-backdrop-filter:blur(36px) saturate(160%);
      box-shadow:0 0 0 1px rgba(255,255,255,.055) inset,0 40px 80px rgba(0,0,0,.55),0 0 100px rgba(0,229,255,.10),0 0 50px rgba(155,93,229,.10);
      animation:card-in .65s cubic-bezier(.16,1,.3,1) both;
      position:relative;overflow:hidden;
    }
    @keyframes card-in { from{opacity:0;transform:translateY(26px) scale(.97)} to{opacity:1;transform:none} }

    .scan-line { position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.3),transparent);animation:scan 4.2s linear infinite;pointer-events:none; }
    @keyframes scan { 0%{top:-2px} 100%{top:100%} }
    .corner { position:absolute;width:16px;height:16px; }
    .tl{top:13px;left:13px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
    .tr{top:13px;right:13px;border-top:2px solid var(--violet);border-right:2px solid var(--violet);}
    .bl{bottom:13px;left:13px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan);}
    .br{bottom:13px;right:13px;border-bottom:2px solid var(--violet);border-right:2px solid var(--violet);}

    /* ── Logo ── */
    .logo-row { display:flex;align-items:center;gap:13px;margin-bottom:6px; }
    .logo-icon { width:48px;height:48px;background:linear-gradient(135deg,var(--violet),var(--cyan));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 22px rgba(0,229,255,.28);flex-shrink:0; }
    .logo-text { font-family:'Orbitron',monospace;font-weight:900;font-size:24px;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .tagline { font-size:12.5px;color:var(--muted);margin-bottom:28px;font-style:italic; }
    .divider { height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:26px; }

    /* ── Tabs ── */
    .tabs { display:grid;grid-template-columns:1fr 1fr;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px; }
    .tab { padding:9px;border:none;border-radius:9px;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:background .2s,color .2s;background:transparent;color:var(--muted); }
    .tab.active { background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(155,93,229,.18));color:var(--text);border:1px solid rgba(0,229,255,.2); }

    /* ── Fields ── */
    .field { margin-bottom:18px; }
    .label { display:block;font-size:10.5px;font-family:'Orbitron',monospace;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none; }
    .field input {
      width:100%;background:rgba(255,255,255,.055);border:1px solid var(--border);border-radius:11px;
      padding:13px 15px 13px 42px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);
      outline:none;transition:border-color .22s,box-shadow .22s;letter-spacing:.2px;
    }
    .field input::placeholder { color:var(--muted); }
    .field input:focus { border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.10); }

    /* toggle password visibility */
    .pwd-toggle { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:2px; }
    .pwd-toggle:hover { color:var(--text); }

    /* ── Button ── */
    .btn {
      position:relative;width:100%;padding:14px;border:none;border-radius:11px;
      font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;
      color:#000;cursor:pointer;overflow:hidden;
      background:linear-gradient(135deg,var(--cyan),var(--violet));
      box-shadow:0 0 28px rgba(0,229,255,.28),0 8px 28px rgba(0,0,0,.4);
      transition:transform .18s,box-shadow .18s;
    }
    .btn:hover { transform:translateY(-2px);box-shadow:0 0 44px rgba(0,229,255,.42),0 12px 36px rgba(0,0,0,.4); }
    .btn:active { transform:none; }
    .btn:disabled { opacity:.45;cursor:not-allowed;transform:none; }
    .btn::after { content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:sh 2.4s infinite; }
    @keyframes sh { 0%{left:-100%} 100%{left:200%} }

    /* ── Alerts ── */
    .err { display:none;margin-top:14px;padding:11px 15px;border-radius:10px;background:rgba(247,37,133,.1);border:1px solid rgba(247,37,133,.28);color:#ff6b9d;font-size:13px; }
    .err.show { display:block;animation:shake .3s ease; }
    .ok-msg { display:none;margin-top:14px;padding:11px 15px;border-radius:10px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);color:var(--green);font-size:13px; }
    .ok-msg.show { display:block; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

    /* ── Status ── */
    .status-row { margin-top:22px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted); }
    .sdot { width:8px;height:8px;border-radius:50%;background:#3a3a5c;flex-shrink:0;transition:all .4s; }
    .sdot.ok  { background:var(--green);box-shadow:0 0 9px rgba(0,230,118,.55);animation:pd 1.6s infinite; }
    .sdot.err { background:var(--rose); }
    @keyframes pd { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.45);opacity:.7} }

    .footer { margin-top:26px;text-align:center;font-size:10.5px;color:rgba(232,234,246,.16);letter-spacing:1.5px;font-family:'Orbitron',monospace;text-transform:uppercase; }

    /* ── Restore Banner ── */
    .restore { display:none;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);margin-bottom:18px;font-size:13px;color:var(--cyan); }
    .restore.show { display:flex; }
    .restore button { margin-left:auto;padding:5px 12px;border-radius:8px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.12);color:var(--cyan);font-size:11px;font-family:'Orbitron',monospace;cursor:pointer;letter-spacing:1px; }
    .restore button:hover { background:rgba(0,229,255,.22); }
  </style>
</head>
<body>
  <div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="grain"></div>
  <div class="grid"></div>

  <div class="stage">
    <div class="card">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>

      <div class="logo-row">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">NEXUS</div>
      </div>
      <p class="tagline">Real-time chat · Voice · Media · Persistent history</p>
      <div class="divider"></div>

      <!-- Auto-restore session banner -->
      <div class="restore" id="restore-banner">
        <span>🔄</span>
        <span id="restore-text">Session found — continue as <strong id="restore-name"></strong>?</span>
        <button id="restore-btn">CONTINUE</button>
      </div>

      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab active" id="tab-login"    onclick="switchTab('login')">LOGIN</button>
        <button class="tab"        id="tab-register" onclick="switchTab('register')">REGISTER</button>
      </div>

      <!-- Username field -->
      <div class="field">
        <label class="label" for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">⌘</span>
          <input type="text" id="username" placeholder="Enter username..." maxlength="24" autocomplete="username" spellcheck="false" />
        </div>
      </div>

      <!-- Password field -->
      <div class="field">
        <label class="label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Enter password..." maxlength="64" autocomplete="current-password" />
          <button class="pwd-toggle" type="button" onclick="togglePwd()" id="pwd-eye">👁</button>
        </div>
      </div>

      <!-- Confirm password (register only) -->
      <div class="field" id="confirm-field" style="display:none">
        <label class="label" for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirm" placeholder="Re-enter password..." maxlength="64" autocomplete="new-password"/>
        </div>
      </div>

      <button class="btn" id="submit-btn">LOGIN</button>

      <div class="err"    id="err-msg"></div>
      <div class="ok-msg" id="ok-msg"></div>

      <div class="status-row">
        <div class="sdot" id="sdot"></div>
        <span id="stext">Checking server...</span>
      </div>

      <p class="footer">Prince Kumar Yadav · Nexus Chat v3</p>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let mode = 'login';

    // ── Auto-login: check existing session ───────────────────────────────────
    (function checkSession() {
      const saved = sessionStorage.getItem('nexus-v3-user');
      if (!saved) return;
      try {
        const user = JSON.parse(saved);
        if (!user.username || !user.sessionId) return;

        // Show restore banner
        const banner = document.getElementById('restore-banner');
        document.getElementById('restore-name').textContent = user.username;
        document.getElementById('username').value = user.username;
        banner.classList.add('show');

        document.getElementById('restore-btn').addEventListener('click', () => {
          window.location.href = '/chat.html';
        });
      } catch (_) {}
    })();

    // ── Server health ping ────────────────────────────────────────────────────
    fetch('/api/users/online')
      .then(() => { setStatus('ok','Server online'); })
      .catch(() => { setStatus('err','Server unreachable'); });

    function setStatus(cls, text) {
      document.getElementById('sdot').className = `sdot ${cls}`;
      document.getElementById('stext').textContent = text;
    }

    // ── Tab switch ────────────────────────────────────────────────────────────
    function switchTab(m) {
      mode = m;
      document.getElementById('tab-login').classList.toggle('active',    m === 'login');
      document.getElementById('tab-register').classList.toggle('active', m === 'register');
      document.getElementById('confirm-field').style.display = m === 'register' ? 'block' : 'none';
      document.getElementById('submit-btn').textContent = m === 'login' ? 'LOGIN' : 'CREATE ACCOUNT';
      clearMessages();
    }

    function togglePwd() {
      const inp = document.getElementById('password');
      const eye = document.getElementById('pwd-eye');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      eye.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    // ── Error/ok helpers ──────────────────────────────────────────────────────
    function showErr(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
      document.getElementById('ok-msg').classList.remove('show');
    }
    function showOk(msg) {
      const el = document.getElementById('ok-msg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('err-msg').classList.remove('show');
    }
    function clearMessages() {
      document.getElementById('err-msg').classList.remove('show');
      document.getElementById('ok-msg').classList.remove('show');
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    async function submit() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('submit-btn');

      if (username.length < 2) { showErr('Username must be at least 2 characters.'); return; }
      if (password.length < 4) { showErr('Password must be at least 4 characters.'); return; }
      if (mode === 'register' && password !== confirm) { showErr('Passwords do not match.'); return; }

      btn.disabled    = true;
      btn.textContent = mode === 'login' ? 'LOGGING IN...' : 'CREATING ACCOUNT...';
      clearMessages();

      try {
        const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
        const res      = await fetch(endpoint, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showErr(data.error || 'Something went wrong.');
          btn.disabled    = false;
          btn.textContent = mode === 'login' ? 'LOGIN' : 'CREATE ACCOUNT';
          return;
        }

        // Save session
        sessionStorage.setItem('nexus-v3-user', JSON.stringify({
          username:  data.user.username,
          avatar:    data.user.avatar,
          sessionId: data.user.sessionId,
        }));
        sessionStorage.setItem('nexus-v3-history', JSON.stringify(data.messages || []));

        btn.textContent = 'ENTERING NEXUS...';
        setTimeout(() => { window.location.href = '/chat.html'; }, 400);
      } catch {
        showErr('Network error. Is the server running?');
        btn.disabled    = false;
        btn.textContent = mode === 'login' ? 'LOGIN' : 'CREATE ACCOUNT';
      }
    }

    document.getElementById('submit-btn').addEventListener('click', submit);
    ['username','password','confirm'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    });

    document.getElementById('username').focus();
  </script>
</body>
</html>
